<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PORTFOLIO · ผลงานรับเหมาก่อสร้าง</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e0e; --surface: #1a1a1a; --card: #202020;
      --accent: #e8b84b; --accent2: #c9360c;
      --text: #f0ece4; --muted: #6b6560; --border: #2a2a2a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 1000; opacity: 0.35;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    }

    /* HEADER */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(14,14,14,0.93); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 4px; }
    .logo span { color: var(--accent); }
    .upload-btn {
      background: var(--accent); color: #0e0e0e; border: none;
      padding: 9px 20px; border-radius: 4px;
      font-family: 'Sarabun', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
      display: flex; align-items: center; gap: 6px;
    }
    .upload-btn:hover { background: #f5c85a; transform: translateY(-1px); }

    /* HERO */
    .hero { padding: 56px 24px 36px; max-width: 960px; margin: 0 auto; }
    .hero-label { font-size: 11px; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
    .hero h2 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.8rem, 8vw, 5rem); letter-spacing: 3px; line-height: 1; }
    .hero h2 em { font-style: normal; color: var(--accent2); }
    .hero-desc { margin-top: 14px; color: var(--muted); font-size: 15px; max-width: 420px; line-height: 1.7; }
    .divider { width: 48px; height: 2px; background: var(--accent); margin: 20px 0; }

    /* GALLERY */
    .gallery-section { padding: 0 24px 60px; max-width: 960px; margin: 0 auto; }
    .gallery-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .gallery-meta span { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

    /* PROJECT CARD */
    .proj-card {
      border-radius: 8px; overflow: hidden;
      background: var(--card); border: 1px solid var(--border);
      transition: transform 0.22s, border-color 0.22s;
      cursor: pointer;
    }
    .proj-card:hover { transform: translateY(-4px); border-color: rgba(232,184,75,0.4); }

    /* Slider inside card */
    .slider-wrap { position: relative; aspect-ratio: 4/3; overflow: hidden; background: #111; }
    .slides { display: flex; height: 100%; transition: transform 0.38s cubic-bezier(0.4,0,0.2,1); }
    .slide { min-width: 100%; height: 100%; }
    .slide img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .slide-count {
      position: absolute; bottom: 10px; right: 12px;
      background: rgba(0,0,0,0.6); color: #fff;
      font-size: 11px; padding: 2px 8px; border-radius: 20px; letter-spacing: 1px;
    }
    .slide-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,0.5); border: none; color: #fff;
      width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
      font-size: 16px; display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
      z-index: 5;
    }
    .slider-wrap:hover .slide-btn { opacity: 1; }
    .slide-btn.prev { left: 8px; }
    .slide-btn.next { right: 8px; }
    .slide-btn:hover { background: rgba(232,184,75,0.8); color: #111; }

    /* Dots */
    .slide-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4); transition: background 0.2s, transform 0.2s; }
    .dot.active { background: var(--accent); transform: scale(1.3); }

    /* Card info */
    .card-info { padding: 14px 16px 16px; }
    .card-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
    .meta-tag { font-size: 11px; padding: 2px 8px; border-radius: 3px; background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
    .meta-tag.gold { border-color: rgba(232,184,75,0.3); color: var(--accent); }
    .card-desc { font-size: 13px; color: var(--muted); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* Empty / Loading */
    .empty { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
    .loading { text-align: center; padding: 80px; color: var(--muted); font-size: 13px; letter-spacing: 2px; }
    .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* MODAL */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.88); z-index: 200;
      align-items: flex-start; justify-content: center;
      padding: 20px; backdrop-filter: blur(6px); overflow-y: auto;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 28px; width: 100%; max-width: 480px;
      margin: auto; animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-header h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 3px; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; padding: 4px; }
    .modal-close:hover { color: var(--text); }

    .drop-zone {
      border: 1px dashed var(--muted); border-radius: 6px;
      padding: 26px 20px; text-align: center; cursor: pointer;
      transition: border-color 0.2s, background 0.2s; margin-bottom: 14px;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: rgba(232,184,75,0.04); }
    .drop-icon { font-size: 1.8rem; margin-bottom: 8px; }
    .drop-label { font-size: 14px; }
    .drop-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
    input[type="file"] { display: none; }

    .preview-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; }
    .preview-scroll::-webkit-scrollbar { height: 4px; }
    .preview-scroll::-webkit-scrollbar-track { background: var(--border); border-radius: 2px; }
    .preview-scroll::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }
    .preview-item { flex-shrink: 0; width: 72px; height: 72px; border-radius: 4px; overflow: hidden; background: var(--card); position: relative; }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .preview-count { flex-shrink: 0; width: 72px; height: 72px; border-radius: 4px; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--muted); }

    .field { margin-bottom: 13px; }
    .field label { display: block; font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
    .field input, .field textarea {
      width: 100%; padding: 10px 12px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 4px; color: var(--text);
      font-family: 'Sarabun', sans-serif; font-size: 14px;
      transition: border-color 0.2s; resize: none;
    }
    .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 14px; overflow: hidden; display: none; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; width: 0; }
    .modal-footer { display: flex; gap: 10px; margin-top: 14px; }
    .btn-cancel { flex: 1; padding: 12px; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-family: 'Sarabun', sans-serif; font-size: 14px; }
    .btn-cancel:hover { color: var(--text); border-color: var(--muted); }
    .btn-upload { flex: 2; padding: 12px; background: var(--accent); color: #0e0e0e; border: none; border-radius: 4px; cursor: pointer; font-family: 'Sarabun', sans-serif; font-size: 14px; font-weight: 700; }
    .btn-upload:hover { background: #f5c85a; }
    .btn-upload:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
    .status-msg { text-align: center; font-size: 13px; margin-top: 10px; min-height: 18px; color: var(--muted); }
    .status-msg.ok { color: #68d391; }
    .status-msg.err { color: #fc8181; }

    /* LIGHTBOX */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 300; }
    .lightbox.open { display: flex; }
    .lb-inner { display: flex; width: 100%; height: 100%; }
    .lb-left {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 20px; position: relative; min-width: 0;
    }
    .lb-slider-wrap { position: relative; width: 100%; max-height: 85vh; display: flex; align-items: center; justify-content: center; }
    .lb-slides { display: flex; width: 100%; overflow: hidden; border-radius: 6px; }
    .lb-slide { min-width: 100%; }
    .lb-slide img { width: 100%; max-height: 80vh; object-fit: contain; display: block; }
    .lb-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.1); border: none; color: #fff;
      width: 44px; height: 44px; border-radius: 50%; cursor: pointer;
      font-size: 20px; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; z-index: 5;
    }
    .lb-arrow:hover { background: rgba(232,184,75,0.7); color: #111; }
    .lb-arrow.prev { left: 8px; }
    .lb-arrow.next { right: 8px; }
    .lb-thumb-row { display: flex; gap: 6px; margin-top: 12px; overflow-x: auto; max-width: 100%; padding: 4px; }
    .lb-thumb { width: 52px; height: 52px; border-radius: 4px; overflow: hidden; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; }
    .lb-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .lb-thumb.active { border-color: var(--accent); }
    .lb-count-badge { margin-top: 8px; font-size: 12px; color: var(--muted); letter-spacing: 1px; }

    .lb-right {
      width: 300px; min-width: 300px; height: 100%;
      background: var(--surface); border-left: 1px solid var(--border);
      padding: 28px 24px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 18px;
    }
    .lb-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; line-height: 1.2; }
    .lb-info-item { display: flex; flex-direction: column; gap: 4px; }
    .lb-info-item .lbl { font-size: 11px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
    .lb-info-item .val { font-size: 14px; color: var(--text); line-height: 1.7; }

    .lb-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--muted); font-size: 1.8rem; cursor: pointer; z-index: 10; }
    .lb-close:hover { color: var(--text); }

    @media (max-width: 640px) {
      .gallery { grid-template-columns: 1fr 1fr; gap: 10px; }
      .lb-inner { flex-direction: column; }
      .lb-right { width: 100%; min-width: unset; height: auto; border-left: none; border-top: 1px solid var(--border); }
      .lb-left { padding: 12px; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">PORT<span>·</span>FOLIO</div>
  <button class="upload-btn" onclick="openModal()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    อัปโหลดผลงาน
  </button>
</header>

<section class="hero">
  <p class="hero-label">ผลงานรับเหมาก่อสร้าง</p>
  <h2>BUILD<br><em>PORTFOLIO</em></h2>
  <div class="divider"></div>
  <p class="hero-desc">รวมผลงานทุกโปรเจกต์ — กดการ์ดเพื่อดูรูปทั้งหมดและรายละเอียด</p>
</section>

<section class="gallery-section">
  <div class="gallery-meta">
    <span id="countLabel">กำลังโหลด...</span>
  </div>
  <div class="gallery" id="gallery">
    <div class="loading"><div class="spinner"></div>LOADING...</div>
  </div>
</section>

<!-- Upload Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <h3>อัปโหลดผลงาน</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="drop-zone" id="dropZone"
         onclick="document.getElementById('fileInput').click()"
         ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFiles(event)">
      <div class="drop-icon">📸</div>
      <div class="drop-label" id="dropLabel">คลิกหรือลากรูปมาวางตรงนี้</div>
      <div class="drop-sub">อัปได้ไม่จำกัดจำนวน — JPG, PNG, WEBP</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple onchange="filesSelected(this)">
    <div class="preview-scroll" id="previewScroll" style="display:none"></div>

    <div class="field">
      <label>ชื่อโปรเจกต์ *</label>
      <input type="text" id="fTitle" placeholder="เช่น ต่อเติมบ้าน 2 ชั้น หมู่บ้านสุขสันต์">
    </div>
    <div class="field-row">
      <div class="field">
        <label>ผู้ว่าจ้าง</label>
        <input type="text" id="fClient" placeholder="เช่น คุณสมชาย">
      </div>
      <div class="field">
        <label>ระยะเวลา</label>
        <input type="text" id="fDuration" placeholder="เช่น 45 วัน">
      </div>
    </div>
    <div class="field">
      <label>สถานที่</label>
      <input type="text" id="fLocation" placeholder="เช่น อ.เมือง ขอนแก่น">
    </div>
    <div class="field">
      <label>รายละเอียดเพิ่มเติม</label>
      <textarea id="fDesc" rows="3" placeholder="เช่น งานเทพื้น คสล. ก่อผนังมวลเบา มุงหลังคาเหล็ก..."></textarea>
    </div>

    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn-upload" id="uploadBtn" onclick="startUpload()">📨 อัปโหลด</button>
    </div>
    <div class="status-msg" id="statusMsg"></div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <div class="lb-inner">
    <div class="lb-left">
      <div class="lb-slider-wrap">
        <div class="lb-slides" id="lbSlides"></div>
        <button class="lb-arrow prev" id="lbPrev" onclick="lbSlide(-1)">&#8249;</button>
        <button class="lb-arrow next" id="lbNext" onclick="lbSlide(1)">&#8250;</button>
      </div>
      <div class="lb-thumb-row" id="lbThumbs"></div>
      <div class="lb-count-badge" id="lbCount"></div>
    </div>
    <div class="lb-right" id="lbRight"></div>
  </div>
</div>

<script>
  const CLOUD = 'dmpwrvqmp', PRESET = 'j16i4rpo', KEY = 'portfolio_v3';
  let selectedFiles = [], allProjects = [], lbIdx = 0, lbUrls = [];

  // Storage
  const save = d => { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch(e){} };
  const load = () => { try { return JSON.parse(localStorage.getItem(KEY)||'[]'); } catch(e){ return []; } };

  // ── GALLERY ──
  function renderGallery(projects) {
    const g = document.getElementById('gallery');
    document.getElementById('countLabel').textContent = 'ทั้งหมด ' + projects.length + ' โปรเจกต์';
    if (!projects.length) {
      g.innerHTML = '<div class="empty"><div class="empty-icon">🏗️</div><p>ยังไม่มีผลงาน<br>กดปุ่ม "อัปโหลดผลงาน" เพื่อเริ่มต้น</p></div>';
      return;
    }
    g.innerHTML = '';
    projects.slice().reverse().forEach(function(proj) {
      const card = document.createElement('div');
      card.className = 'proj-card';

      // Slider HTML
      const slidesHtml = proj.urls.map(u => '<div class="slide"><img src="'+u+'" loading="lazy" alt="ผลงาน"></div>').join('');
      const dotsHtml = proj.urls.length > 1 ? '<div class="slide-dots">' + proj.urls.map((_,i) => '<div class="dot'+(i===0?' active':'')+'"></div>').join('') + '</div>' : '';
      const countHtml = proj.urls.length > 1 ? '<div class="slide-count">1 / '+proj.urls.length+'</div>' : '';
      const btnsHtml = proj.urls.length > 1 ? '<button class="slide-btn prev" onclick="cardSlide(event,this,-1)">&#8249;</button><button class="slide-btn next" onclick="cardSlide(event,this,1)">&#8250;</button>' : '';

      const metaTags = [];
      if (proj.client) metaTags.push('<span class="meta-tag">👤 '+proj.client+'</span>');
      if (proj.duration) metaTags.push('<span class="meta-tag gold">⏱ '+proj.duration+'</span>');
      if (proj.location) metaTags.push('<span class="meta-tag">📍 '+proj.location+'</span>');

      card.innerHTML =
        '<div class="slider-wrap" data-idx="0" data-total="'+proj.urls.length+'">' +
          '<div class="slides">'+slidesHtml+'</div>' +
          btnsHtml + dotsHtml + countHtml +
        '</div>' +
        '<div class="card-info">' +
          '<div class="card-title">'+(proj.title||'ผลงาน')+'</div>' +
          (metaTags.length?'<div class="card-meta">'+metaTags.join('')+'</div>':'') +
          (proj.desc?'<div class="card-desc">'+proj.desc+'</div>':'') +
        '</div>';

      card.querySelector('.card-info').addEventListener('click', function() { openLightbox(proj); });
      card.querySelector('.slider-wrap').addEventListener('click', function(e) {
        if (!e.target.classList.contains('slide-btn') && !e.target.closest('.slide-btn')) openLightbox(proj);
      });
      g.appendChild(card);
    });
  }

  function cardSlide(e, btn, dir) {
    e.stopPropagation();
    const wrap = btn.closest('.slider-wrap');
    const slides = wrap.querySelector('.slides');
    const dots = wrap.querySelectorAll('.dot');
    const countEl = wrap.querySelector('.slide-count');
    let idx = parseInt(wrap.dataset.idx) || 0;
    const total = parseInt(wrap.dataset.total) || 1;
    idx = (idx + dir + total) % total;
    wrap.dataset.idx = idx;
    slides.style.transform = 'translateX(-' + (idx * 100) + '%)';
    dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    if (countEl) countEl.textContent = (idx+1) + ' / ' + total;
  }

  // ── MODAL ──
  function openModal() { document.getElementById('overlay').classList.add('open'); }
  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    selectedFiles = [];
    document.getElementById('dropLabel').textContent = 'คลิกหรือลากรูปมาวางตรงนี้';
    document.getElementById('previewScroll').style.display = 'none';
    document.getElementById('previewScroll').innerHTML = '';
    document.getElementById('progressBar').style.display = 'none';
    document.getElementById('progressFill').style.width = '0';
    document.getElementById('statusMsg').textContent = '';
    document.getElementById('statusMsg').className = 'status-msg';
    document.getElementById('uploadBtn').disabled = false;
    document.getElementById('fileInput').value = '';
    ['fTitle','fClient','fDuration','fLocation','fDesc'].forEach(id => document.getElementById(id).value = '');
  }

  function dragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('drag-over'); }
  function dragLeave() { document.getElementById('dropZone').classList.remove('drag-over'); }
  function dropFiles(e) { e.preventDefault(); document.getElementById('dropZone').classList.remove('drag-over'); setFiles(Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'))); }
  function filesSelected(i) { setFiles(Array.from(i.files)); }

  function setFiles(files) {
    selectedFiles = files;
    if (!files.length) return;
    document.getElementById('dropLabel').textContent = 'เลือก ' + files.length + ' รูปแล้ว';
    const scroll = document.getElementById('previewScroll');
    scroll.innerHTML = ''; scroll.style.display = 'flex';
    const show = files.slice(0, 8);
    show.forEach(f => {
      const div = document.createElement('div'); div.className = 'preview-item';
      const img = document.createElement('img'); img.src = URL.createObjectURL(f);
      div.appendChild(img); scroll.appendChild(div);
    });
    if (files.length > 8) {
      const more = document.createElement('div'); more.className = 'preview-count';
      more.textContent = '+' + (files.length-8); scroll.appendChild(more);
    }
  }

  async function startUpload() {
    if (!selectedFiles.length) { alert('กรุณาเลือกรูปภาพก่อน'); return; }
    const meta = {
      title: document.getElementById('fTitle').value.trim() || 'ผลงาน',
      client: document.getElementById('fClient').value.trim(),
      duration: document.getElementById('fDuration').value.trim(),
      location: document.getElementById('fLocation').value.trim(),
      desc: document.getElementById('fDesc').value.trim(),
      date: new Date().toLocaleDateString('th-TH'),
      urls: []
    };
    const btn = document.getElementById('uploadBtn');
    const status = document.getElementById('statusMsg');
    const bar = document.getElementById('progressBar');
    const fill = document.getElementById('progressFill');
    btn.disabled = true; bar.style.display = 'block';
    status.className = 'status-msg'; status.textContent = 'กำลังอัปโหลด 0/' + selectedFiles.length;

    let done = 0;
    for (const file of selectedFiles) {
      try {
        const fd = new FormData();
        fd.append('file', file); fd.append('upload_preset', PRESET);
        const res = await fetch('https://api.cloudinary.com/v1_1/'+CLOUD+'/image/upload', { method:'POST', body:fd });
        const data = await res.json();
        if (data.secure_url) meta.urls.push(data.secure_url);
      } catch(e) {}
      done++;
      fill.style.width = (done/selectedFiles.length*100)+'%';
      status.textContent = 'กำลังอัปโหลด '+done+'/'+selectedFiles.length+' รูป';
    }

    if (meta.urls.length > 0) {
      allProjects.push(meta);
      save(allProjects); renderGallery(allProjects);
      status.textContent = '✅ อัปโหลดสำเร็จ '+meta.urls.length+' รูป!';
      status.className = 'status-msg ok';
      setTimeout(closeModal, 1800);
    } else {
      status.textContent = '❌ อัปโหลดไม่สำเร็จ ลองใหม่';
      status.className = 'status-msg err';
      btn.disabled = false;
    }
  }

  // ── LIGHTBOX ──
  function openLightbox(proj) {
    lbUrls = proj.urls; lbIdx = 0;
    renderLbSlides(); renderLbThumbs(); updateLbCount();

    const info = [];
    if (proj.client) info.push('<div class="lb-info-item"><span class="lbl">👤 ผู้ว่าจ้าง</span><span class="val">'+proj.client+'</span></div>');
    if (proj.duration) info.push('<div class="lb-info-item"><span class="lbl">⏱ ระยะเวลา</span><span class="val">'+proj.duration+'</span></div>');
    if (proj.location) info.push('<div class="lb-info-item"><span class="lbl">📍 สถานที่</span><span class="val">'+proj.location+'</span></div>');
    if (proj.desc) info.push('<div class="lb-info-item"><span class="lbl">📝 รายละเอียด</span><span class="val">'+proj.desc+'</span></div>');
    info.push('<div class="lb-info-item"><span class="lbl">📅 วันที่</span><span class="val">'+proj.date+'</span></div>');
    document.getElementById('lbRight').innerHTML = '<div class="lb-title">'+(proj.title||'ผลงาน')+'</div>'+info.join('');

    document.getElementById('lbPrev').style.display = lbUrls.length > 1 ? 'flex' : 'none';
    document.getElementById('lbNext').style.display = lbUrls.length > 1 ? 'flex' : 'none';
    document.getElementById('lightbox').classList.add('open');
  }

  function renderLbSlides() {
    document.getElementById('lbSlides').innerHTML = lbUrls.map(u =>
      '<div class="lb-slide"><img src="'+u+'" alt="ผลงาน"></div>'
    ).join('');
    document.getElementById('lbSlides').style.transform = 'translateX(-'+lbIdx*100+'%)';
  }
  function renderLbThumbs() {
    const row = document.getElementById('lbThumbs');
    if (lbUrls.length <= 1) { row.innerHTML=''; return; }
    row.innerHTML = lbUrls.map((u,i) =>
      '<div class="lb-thumb'+(i===lbIdx?' active':'')+'" onclick="lbGoTo('+i+')"><img src="'+u+'" alt=""></div>'
    ).join('');
  }
  function updateLbCount() {
    document.getElementById('lbCount').textContent = lbUrls.length > 1 ? (lbIdx+1)+' / '+lbUrls.length+' รูป' : '';
  }
  function lbSlide(dir) {
    lbIdx = (lbIdx + dir + lbUrls.length) % lbUrls.length;
    document.getElementById('lbSlides').style.transform = 'translateX(-'+lbIdx*100+'%)';
    renderLbThumbs(); updateLbCount();
  }
  function lbGoTo(i) { lbIdx = i; document.getElementById('lbSlides').style.transform = 'translateX(-'+i*100+'%)'; renderLbThumbs(); updateLbCount(); }
  function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeLightbox(); closeModal(); }
    if (e.key === 'ArrowLeft') lbSlide(-1);
    if (e.key === 'ArrowRight') lbSlide(1);
  });

  // Init
  allProjects = load();
  renderGallery(allProjects);
</script>
</body>
</html>
