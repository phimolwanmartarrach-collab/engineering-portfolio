<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PORTFOLIO · ผลงานรับเหมาก่อสร้าง</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #1a1a1a;
      --card: #202020;
      --accent: #e8b84b;
      --accent2: #c9360c;
      --text: #f0ece4;
      --muted: #6b6560;
      --border: #2a2a2a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(14,14,14,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 4px; }
    .logo span { color: var(--accent); }
    .upload-btn {
      background: var(--accent); color: #0e0e0e; border: none;
      padding: 9px 20px; border-radius: 4px;
      font-family: 'Sarabun', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
      display: flex; align-items: center; gap: 6px;
    }
    .upload-btn:hover { background: #f5c85a; transform: translateY(-1px); }
    .hero { padding: 60px 24px 40px; max-width: 960px; margin: 0 auto; }
    .hero-label { font-size: 11px; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
    .hero h2 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.8rem, 8vw, 5rem); letter-spacing: 3px; line-height: 1; }
    .hero h2 em { font-style: normal; color: var(--accent2); }
    .hero-desc { margin-top: 16px; color: var(--muted); font-size: 15px; max-width: 400px; line-height: 1.7; }
    .divider { width: 48px; height: 2px; background: var(--accent); margin: 24px 0; }

    /* Gallery */
    .gallery-section { padding: 0 24px 60px; max-width: 960px; margin: 0 auto; }
    .gallery-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .gallery-meta span { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }

    /* Card */
    .img-card {
      border-radius: 6px; overflow: hidden;
      background: var(--card); cursor: pointer;
      border: 1px solid var(--border);
      transition: transform 0.2s, border-color 0.2s;
    }
    .img-card:hover { transform: translateY(-3px); border-color: var(--accent); }
    .img-card .thumb { width: 100%; aspect-ratio: 4/3; overflow: hidden; }
    .img-card .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s; }
    .img-card:hover .thumb img { transform: scale(1.05); }
    .card-info { padding: 14px 16px; }
    .card-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .meta-tag {
      font-size: 11px; padding: 3px 8px; border-radius: 3px;
      background: var(--surface); color: var(--muted);
      border: 1px solid var(--border); letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 4px;
    }
    .meta-tag.accent { border-color: rgba(232,184,75,0.3); color: var(--accent); }
    .card-desc { font-size: 13px; color: var(--muted); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .empty { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
    .loading { text-align: center; padding: 80px; color: var(--muted); font-size: 13px; letter-spacing: 2px; }
    .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Modal */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.88); z-index: 200;
      align-items: center; justify-content: center;
      padding: 20px; backdrop-filter: blur(6px);
      overflow-y: auto;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 28px; width: 100%; max-width: 460px;
      animation: slideUp 0.25s ease; margin: auto;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-header h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 3px; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; }
    .modal-close:hover { color: var(--text); }

    .drop-zone {
      border: 1px dashed var(--muted); border-radius: 6px;
      padding: 28px 20px; text-align: center; cursor: pointer;
      transition: border-color 0.2s, background 0.2s; margin-bottom: 16px;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: rgba(232,184,75,0.04); }
    .drop-icon { font-size: 1.8rem; margin-bottom: 8px; }
    .drop-label { font-size: 14px; color: var(--text); }
    .drop-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
    input[type="file"] { display: none; }

    .preview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 16px; }
    .preview-item { aspect-ratio: 1; border-radius: 4px; overflow: hidden; background: var(--card); }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; }

    /* Form fields */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
    .field input, .field textarea {
      width: 100%; padding: 10px 12px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 4px; color: var(--text);
      font-family: 'Sarabun', sans-serif; font-size: 14px;
      transition: border-color 0.2s; resize: none;
    }
    .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 16px; overflow: hidden; display: none; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; width: 0%; }

    .modal-footer { display: flex; gap: 10px; margin-top: 16px; }
    .btn-cancel { flex: 1; padding: 12px; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-family: 'Sarabun', sans-serif; font-size: 14px; }
    .btn-cancel:hover { color: var(--text); border-color: var(--muted); }
    .btn-upload { flex: 2; padding: 12px; background: var(--accent); color: #0e0e0e; border: none; border-radius: 4px; cursor: pointer; font-family: 'Sarabun', sans-serif; font-size: 14px; font-weight: 700; }
    .btn-upload:hover { background: #f5c85a; }
    .btn-upload:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
    .status-msg { text-align: center; font-size: 13px; margin-top: 12px; min-height: 18px; color: var(--muted); }
    .status-msg.ok { color: #68d391; }
    .status-msg.err { color: #fc8181; }

    /* Lightbox */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 300; }
    .lightbox.open { display: flex; }
    .lb-inner { display: flex; width: 100%; height: 100%; align-items: center; justify-content: center; gap: 0; }
    .lb-img-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; max-height: 100vh; }
    .lb-img-wrap img { max-width: 100%; max-height: 90vh; border-radius: 4px; object-fit: contain; }
    .lb-detail {
      width: 280px; min-width: 280px; height: 100%;
      background: var(--surface); border-left: 1px solid var(--border);
      padding: 28px 24px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 16px;
    }
    .lb-detail-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 2px; line-height: 1.2; }
    .lb-detail-item { display: flex; flex-direction: column; gap: 4px; }
    .lb-detail-item .lbl { font-size: 11px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
    .lb-detail-item .val { font-size: 14px; color: var(--text); line-height: 1.6; }
    .lb-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--muted); font-size: 1.8rem; cursor: pointer; z-index: 10; }
    .lb-close:hover { color: var(--text); }

    @media (max-width: 600px) {
      .gallery { grid-template-columns: 1fr 1fr; }
      .lb-inner { flex-direction: column; }
      .lb-detail { width: 100%; min-width: unset; height: auto; border-left: none; border-top: 1px solid var(--border); }
      .lb-img-wrap { padding: 16px 16px 0; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">PORT<span>·</span>FOLIO</div>
  <button class="upload-btn" onclick="openModal()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    อัปโหลดผลงาน
  </button>
</header>

<section class="hero">
  <p class="hero-label">ผลงานรับเหมาก่อสร้าง</p>
  <h2>BUILD<br><em>PORTFOLIO</em></h2>
  <div class="divider"></div>
  <p class="hero-desc">รวมผลงานก่อสร้างทั้งหมด กดรูปเพื่อดูรายละเอียด</p>
</section>

<section class="gallery-section">
  <div class="gallery-meta">
    <span id="countLabel">กำลังโหลด...</span>
  </div>
  <div class="gallery" id="gallery">
    <div class="loading"><div class="spinner"></div>LOADING...</div>
  </div>
</section>

<!-- Upload Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <h3>อัปโหลดผลงาน</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="drop-zone" id="dropZone"
         onclick="document.getElementById('fileInput').click()"
         ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFiles(event)">
      <div class="drop-icon">📸</div>
      <div class="drop-label" id="dropLabel">คลิกหรือลากรูปมาวางตรงนี้</div>
      <div class="drop-sub">JPG, PNG, WEBP — อัปได้หลายรูปพร้อมกัน</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple onchange="filesSelected(this)">
    <div class="preview-grid" id="previewGrid" style="display:none"></div>

    <div class="field">
      <label>ชื่อโปรเจกต์ / งาน *</label>
      <input type="text" id="fTitle" placeholder="เช่น ต่อเติมบ้าน 2 ชั้น">
    </div>
    <div class="field-row">
      <div class="field">
        <label>ผู้ว่าจ้าง</label>
        <input type="text" id="fClient" placeholder="เช่น คุณสมชาย">
      </div>
      <div class="field">
        <label>ระยะเวลา</label>
        <input type="text" id="fDuration" placeholder="เช่น 45 วัน">
      </div>
    </div>
    <div class="field">
      <label>สถานที่</label>
      <input type="text" id="fLocation" placeholder="เช่น อ.เมือง ขอนแก่น">
    </div>
    <div class="field">
      <label>รายละเอียดเพิ่มเติม</label>
      <textarea id="fDesc" rows="3" placeholder="เช่น งานเทพื้น, ก่อผนัง, มุงหลังคา..."></textarea>
    </div>

    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn-upload" id="uploadBtn" onclick="startUpload()">📨 อัปโหลด</button>
    </div>
    <div class="status-msg" id="statusMsg"></div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <div class="lb-inner">
    <div class="lb-img-wrap">
      <img id="lbImg" src="" alt="">
    </div>
    <div class="lb-detail" id="lbDetail"></div>
  </div>
</div>

<script>
  const CLOUD_NAME = 'dmpwrvqmp';
  const UPLOAD_PRESET = 'j16i4rpo';
  const STORAGE_KEY = 'portfolio_images_v2';

  let selectedFiles = [];
  let allImages = [];

  function saveImages(imgs) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(imgs)); } catch(e) {} }
  function loadImages() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; } }

  function renderGallery(imgs) {
    const gallery = document.getElementById('gallery');
    document.getElementById('countLabel').textContent = 'ผลงานทั้งหมด ' + imgs.length + ' รายการ';
    if (!imgs.length) {
      gallery.innerHTML = '<div class="empty"><div class="empty-icon">🏗️</div><p>ยังไม่มีผลงาน<br>กดปุ่ม "อัปโหลดผลงาน" เพื่อเริ่มต้น</p></div>';
      return;
    }
    gallery.innerHTML = '';
    imgs.slice().reverse().forEach(function(img, i) {
      const card = document.createElement('div');
      card.className = 'img-card';
      const metaTags = [];
      if (img.client) metaTags.push('<span class="meta-tag">👤 ' + img.client + '</span>');
      if (img.duration) metaTags.push('<span class="meta-tag accent">⏱ ' + img.duration + '</span>');
      if (img.location) metaTags.push('<span class="meta-tag">📍 ' + img.location + '</span>');
      card.innerHTML =
        '<div class="thumb"><img src="' + img.url + '" loading="lazy" alt="ผลงาน"></div>' +
        '<div class="card-info">' +
          '<div class="card-title">' + (img.title || 'ผลงาน') + '</div>' +
          (metaTags.length ? '<div class="card-meta">' + metaTags.join('') + '</div>' : '') +
          (img.desc ? '<div class="card-desc">' + img.desc + '</div>' : '') +
        '</div>';
      card.onclick = function() { openLightbox(img); };
      gallery.appendChild(card);
    });
  }

  function initGallery() {
    allImages = loadImages();
    renderGallery(allImages);
  }

  function openModal() { document.getElementById('overlay').classList.add('open'); }
  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    selectedFiles = [];
    document.getElementById('dropLabel').textContent = 'คลิกหรือลากรูปมาวางตรงนี้';
    document.getElementById('previewGrid').style.display = 'none';
    document.getElementById('previewGrid').innerHTML = '';
    document.getElementById('progressBar').style.display = 'none';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('statusMsg').textContent = '';
    document.getElementById('statusMsg').className = 'status-msg';
    document.getElementById('uploadBtn').disabled = false;
    document.getElementById('fileInput').value = '';
    ['fTitle','fClient','fDuration','fLocation','fDesc'].forEach(function(id) {
      document.getElementById(id).value = '';
    });
  }

  function dragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('drag-over'); }
  function dragLeave() { document.getElementById('dropZone').classList.remove('drag-over'); }
  function dropFiles(e) {
    e.preventDefault();
    document.getElementById('dropZone').classList.remove('drag-over');
    setFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')));
  }
  function filesSelected(input) { setFiles(Array.from(input.files)); }
  function setFiles(files) {
    selectedFiles = files;
    if (!files.length) return;
    document.getElementById('dropLabel').textContent = 'เลือก ' + files.length + ' รูปแล้ว';
    const grid = document.getElementById('previewGrid');
    grid.innerHTML = ''; grid.style.display = 'grid';
    files.slice(0, 4).forEach(function(f) {
      const div = document.createElement('div'); div.className = 'preview-item';
      const img = document.createElement('img'); img.src = URL.createObjectURL(f);
      div.appendChild(img); grid.appendChild(div);
    });
  }

  async function startUpload() {
    if (!selectedFiles.length) { alert('กรุณาเลือกรูปภาพก่อน'); return; }
    const meta = {
      title: document.getElementById('fTitle').value.trim() || 'ผลงาน',
      client: document.getElementById('fClient').value.trim(),
      duration: document.getElementById('fDuration').value.trim(),
      location: document.getElementById('fLocation').value.trim(),
      desc: document.getElementById('fDesc').value.trim(),
      date: new Date().toLocaleDateString('th-TH')
    };
    const btn = document.getElementById('uploadBtn');
    const status = document.getElementById('statusMsg');
    const bar = document.getElementById('progressBar');
    const fill = document.getElementById('progressFill');
    btn.disabled = true; bar.style.display = 'block';
    status.className = 'status-msg'; status.textContent = 'กำลังอัปโหลด...';

    let done = 0;
    const newImages = [];
    for (const file of selectedFiles) {
      try {
        const fd = new FormData();
        fd.append('file', file); fd.append('upload_preset', UPLOAD_PRESET);
        const res = await fetch('https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/image/upload', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.secure_url) newImages.push(Object.assign({ url: data.secure_url }, meta));
      } catch(e) {}
      done++;
      fill.style.width = (done / selectedFiles.length * 100) + '%';
      status.textContent = 'อัปโหลด ' + done + '/' + selectedFiles.length + ' รูป';
    }

    if (newImages.length > 0) {
      allImages = allImages.concat(newImages);
      saveImages(allImages); renderGallery(allImages);
      status.textContent = '✅ อัปโหลดสำเร็จ ' + newImages.length + ' รูป!';
      status.className = 'status-msg ok';
      setTimeout(closeModal, 1800);
    } else {
      status.textContent = '❌ อัปโหลดไม่สำเร็จ ลองใหม่';
      status.className = 'status-msg err';
      btn.disabled = false;
    }
  }

  function openLightbox(img) {
    document.getElementById('lbImg').src = img.url;
    const rows = [];
    if (img.client) rows.push('<div class="lb-detail-item"><span class="lbl">👤 ผู้ว่าจ้าง</span><span class="val">' + img.client + '</span></div>');
    if (img.duration) rows.push('<div class="lb-detail-item"><span class="lbl">⏱ ระยะเวลา</span><span class="val">' + img.duration + '</span></div>');
    if (img.location) rows.push('<div class="lb-detail-item"><span class="lbl">📍 สถานที่</span><span class="val">' + img.location + '</span></div>');
    if (img.desc) rows.push('<div class="lb-detail-item"><span class="lbl">📝 รายละเอียด</span><span class="val">' + img.desc + '</span></div>');
    rows.push('<div class="lb-detail-item"><span class="lbl">📅 วันที่อัปโหลด</span><span class="val">' + img.date + '</span></div>');
    document.getElementById('lbDetail').innerHTML =
      '<div class="lb-detail-title">' + (img.title || 'ผลงาน') + '</div>' + rows.join('');
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { closeLightbox(); closeModal(); } });

  initGallery();
</script>
</body>
</html>
